<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150">
  <rect width="200" height="150" fill="#e8eef7"/>
  <rect x="0" y="120" width="200" height="30" fill="#8fbc8f"/>
  <!-- Larger building -->
  <rect x="20" y="30" width="160" height="90" fill="#c4b59a" stroke="#333" stroke-width="2"/>
  <!-- Roof -->
  <polygon points="15,30 100,2 185,30" fill="#8b4513" stroke="#333" stroke-width="2"/>
  <!-- Four windows - top row -->
  <rect x="32" y="42" width="24" height="18" fill="#87ceeb" stroke="#333" stroke-width="2"/>
  <line x1="44" y1="42" x2="44" y2="60" stroke="#333" stroke-width="1.5"/>
  <line x1="32" y1="51" x2="56" y2="51" stroke="#333" stroke-width="1.5"/>
  <rect x="88" y="42" width="24" height="18" fill="#87ceeb" stroke="#333" stroke-width="2"/>
  <line x1="100" y1="42" x2="100" y2="60" stroke="#333" stroke-width="1.5"/>
  <line x1="88" y1="51" x2="112" y2="51" stroke="#333" stroke-width="1.5"/>
  <rect x="144" y="42" width="24" height="18" fill="#87ceeb" stroke="#333" stroke-width="2"/>
  <line x1="156" y1="42" x2="156" y2="60" stroke="#333" stroke-width="1.5"/>
  <line x1="144" y1="51" x2="168" y2="51" stroke="#333" stroke-width="1.5"/>
  <!-- Bottom window -->
  <rect x="32" y="75" width="24" height="18" fill="#87ceeb" stroke="#333" stroke-width="2"/>
  <line x1="44" y1="75" x2="44" y2="93" stroke="#333" stroke-width="1.5"/>
  <line x1="32" y1="84" x2="56" y2="84" stroke="#333" stroke-width="1.5"/>
  <!-- Door -->
  <rect x="88" y="93" width="24" height="27" fill="#6b4226" stroke="#333" stroke-width="2"/>
  <circle cx="107" cy="107" r="2" fill="#d4a017"/>
</svg>