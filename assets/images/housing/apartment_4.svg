<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150">
  <rect width="200" height="150" fill="#e8eef7"/>
  <rect x="0" y="120" width="200" height="30" fill="#8fbc8f"/>
  <!-- Country house -->
  <rect x="40" y="50" width="100" height="70" fill="#d2b48c" stroke="#333" stroke-width="2"/>
  <!-- Roof -->
  <polygon points="30,50 90,12 150,50" fill="#a0522d" stroke="#333" stroke-width="2"/>
  <!-- Chimney -->
  <rect x="120" y="18" width="12" height="25" fill="#8b4513" stroke="#333" stroke-width="2"/>
  <!-- Windows -->
  <rect x="52" y="62" width="22" height="18" fill="#87ceeb" stroke="#333" stroke-width="2"/>
  <line x1="63" y1="62" x2="63" y2="80" stroke="#333" stroke-width="1.5"/>
  <rect x="106" y="62" width="22" height="18" fill="#87ceeb" stroke="#333" stroke-width="2"/>
  <line x1="117" y1="62" x2="117" y2="80" stroke="#333" stroke-width="1.5"/>
  <!-- Door -->
  <rect x="78" y="95" width="24" height="25" fill="#6b4226" stroke="#333" stroke-width="2"/>
  <circle cx="97" cy="108" r="2" fill="#d4a017"/>
  <!-- Tree -->
  <rect x="165" y="80" width="8" height="40" fill="#6b4226" stroke="#333" stroke-width="1.5"/>
  <circle cx="169" cy="65" r="20" fill="#228b22" stroke="#333" stroke-width="2"/>
  <!-- Fence -->
  <line x1="10" y1="120" x2="190" y2="120" stroke="#8b7355" stroke-width="2"/>
  <rect x="10" y="110" width="4" height="12" fill="#8b7355" stroke="#333" stroke-width="1"/>
  <rect x="26" y="110" width="4" height="12" fill="#8b7355" stroke="#333" stroke-width="1"/>
</svg>