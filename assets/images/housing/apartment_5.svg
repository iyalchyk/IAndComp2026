<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150">
  <rect width="200" height="150" fill="#e8eef7"/>
  <rect x="0" y="120" width="200" height="30" fill="#8fbc8f"/>
  <!-- Mansion body -->
  <rect x="30" y="45" width="140" height="75" fill="#f5deb3" stroke="#333" stroke-width="2"/>
  <!-- Roof / pediment -->
  <polygon points="25,45 100,15 175,45" fill="#cd853f" stroke="#333" stroke-width="2"/>
  <!-- Columns -->
  <rect x="50" y="55" width="8" height="65" fill="#fff8dc" stroke="#333" stroke-width="1.5"/>
  <rect x="72" y="55" width="8" height="65" fill="#fff8dc" stroke="#333" stroke-width="1.5"/>
  <rect x="120" y="55" width="8" height="65" fill="#fff8dc" stroke="#333" stroke-width="1.5"/>
  <rect x="142" y="55" width="8" height="65" fill="#fff8dc" stroke="#333" stroke-width="1.5"/>
  <!-- Column capitals -->
  <rect x="47" y="53" width="14" height="4" fill="#fff8dc" stroke="#333" stroke-width="1"/>
  <rect x="69" y="53" width="14" height="4" fill="#fff8dc" stroke="#333" stroke-width="1"/>
  <rect x="117" y="53" width="14" height="4" fill="#fff8dc" stroke="#333" stroke-width="1"/>
  <rect x="139" y="53" width="14" height="4" fill="#fff8dc" stroke="#333" stroke-width="1"/>
  <!-- Windows -->
  <rect x="90" y="58" width="20" height="16" fill="#87ceeb" stroke="#333" stroke-width="1.5"/>
  <line x1="100" y1="58" x2="100" y2="74" stroke="#333" stroke-width="1"/>
  <!-- Grand door -->
  <rect x="86" y="92" width="28" height="28" fill="#6b4226" stroke="#333" stroke-width="2"/>
  <path d="M86,92 Q100,82 114,92" fill="#6b4226" stroke="#333" stroke-width="2"/>
  <circle cx="96" cy="106" r="2" fill="#d4a017"/>
  <circle cx="104" cy="106" r="2" fill="#d4a017"/>
</svg>