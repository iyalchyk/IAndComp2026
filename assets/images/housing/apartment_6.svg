<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150">
  <rect width="200" height="150" fill="#e8eef7"/>
  <rect x="0" y="120" width="200" height="30" fill="#8fbc8f"/>
  <!-- Main palace body -->
  <rect x="40" y="50" width="120" height="70" fill="#fff8dc" stroke="#333" stroke-width="2"/>
  <!-- Left tower -->
  <rect x="20" y="30" width="30" height="90" fill="#f5deb3" stroke="#333" stroke-width="2"/>
  <polygon points="18,30 35,10 52,30" fill="#b8860b" stroke="#333" stroke-width="2"/>
  <!-- Right tower -->
  <rect x="150" y="30" width="30" height="90" fill="#f5deb3" stroke="#333" stroke-width="2"/>
  <polygon points="148,30 165,10 182,30" fill="#b8860b" stroke="#333" stroke-width="2"/>
  <!-- Central dome -->
  <path d="M75,50 Q100,20 125,50" fill="#b8860b" stroke="#333" stroke-width="2"/>
  <!-- Tower windows -->
  <rect x="28" y="45" width="14" height="12" fill="#87ceeb" stroke="#333" stroke-width="1.5"/>
  <rect x="158" y="45" width="14" height="12" fill="#87ceeb" stroke="#333" stroke-width="1.5"/>
  <!-- Main windows -->
  <rect x="55" y="62" width="18" height="14" fill="#87ceeb" stroke="#333" stroke-width="1.5"/>
  <line x1="64" y1="62" x2="64" y2="76" stroke="#333" stroke-width="1"/>
  <rect x="91" y="62" width="18" height="14" fill="#87ceeb" stroke="#333" stroke-width="1.5"/>
  <line x1="100" y1="62" x2="100" y2="76" stroke="#333" stroke-width="1"/>
  <rect x="127" y="62" width="18" height="14" fill="#87ceeb" stroke="#333" stroke-width="1.5"/>
  <line x1="136" y1="62" x2="136" y2="76" stroke="#333" stroke-width="1"/>
  <!-- Grand entrance -->
  <rect x="88" y="95" width="24" height="25" fill="#6b4226" stroke="#333" stroke-width="2"/>
  <path d="M88,95 Q100,85 112,95" fill="#6b4226" stroke="#333" stroke-width="2"/>
  <!-- Flag poles on towers -->
  <line x1="35" y1="10" x2="35" y2="2" stroke="#333" stroke-width="1.5"/>
  <polygon points="35,2 45,5 35,8" fill="#cc0000"/>
  <line x1="165" y1="10" x2="165" y2="2" stroke="#333" stroke-width="1.5"/>
  <polygon points="165,2 175,5 165,8" fill="#cc0000"/>
</svg>