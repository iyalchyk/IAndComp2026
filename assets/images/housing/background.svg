  <rect x="535" y="198" width="10" height="62" fill="#5c3a1e" stroke="#3a2010" stroke-width="1"/>
  <rect x="615" y="198" width="10" height="62" fill="#5c3a1e" stroke="#3a2010" stroke-width="1"/>
  <!-- Vase on table -->
  <ellipse cx="580" cy="190" rx="14" ry="6" fill="#b05030" stroke="#802020" stroke-width="1.5"/>
  <rect x="570" y="155" width="20" height="35" rx="4" fill="#c06040" stroke="#802020" stroke-width="1.5"/>
  <ellipse cx="580" cy="155" rx="10" ry="4" fill="#b05030" stroke="#802020" stroke-width="1"/>
  <!-- Flowers -->
