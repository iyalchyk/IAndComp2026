  <circle cx="63" cy="110" r="3" fill="#d4a017" stroke="#b8860b" stroke-width="1"/>
  <circle cx="77" cy="110" r="3" fill="#d4a017" stroke="#b8860b" stroke-width="1"/>
  <!-- Lower doors -->
  <rect x="25" y="165" width="43" height="85" fill="#6b4226" stroke="#3a2010" stroke-width="1.5"/>
