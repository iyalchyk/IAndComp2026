  <rect x="156" y="88" width="7" height="30" fill="#2980b9"/>
  <rect x="164" y="86" width="9" height="32" fill="#27ae60"/>
  <rect x="174" y="90" width="6" height="28" fill="#8e44ad"/>
  <rect x="181" y="87" width="8" height="31" fill="#d4a017"/>
  <rect x="147" y="125" width="10" height="33" fill="#e67e22"/>
  <rect x="158" y="128" width="7" height="30" fill="#1abc9c"/>
  <rect x="166" y="126" width="8" height="32" fill="#c0392b"/>
  <rect x="175" y="130" width="9" height="28" fill="#34495e"/>
  <rect x="147" y="165" width="7" height="33" fill="#9b59b6"/>
  <rect x="155" y="168" width="8" height="30" fill="#e74c3c"/>
  <rect x="164" y="166" width="10" height="32" fill="#2c3e50"/>
  <!-- Bookshelf top -->
