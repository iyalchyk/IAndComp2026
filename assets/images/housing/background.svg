<svg xmlns="http://www.w3.org/2000/svg" width="693" height="438" viewBox="0 0 693 438">
  <!-- Ceiling -->
  <rect width="693" height="438" fill="#d4c8a8"/>
  <!-- Back wall -->
  <rect x="0" y="0" width="693" height="260" fill="#c9b88c"/>
