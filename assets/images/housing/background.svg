  <line x1="580" y1="155" x2="580" y2="118" stroke="#2d8b2d" stroke-width="2"/>
  <line x1="585" y1="155" x2="592" y2="128" stroke="#2d8b2d" stroke-width="2"/>
  <circle cx="570" cy="122" r="6" fill="#e74c3c" opacity="0.8"/>
  <circle cx="580" cy="115" r="7" fill="#f39c12" opacity="0.8"/>
  <circle cx="592" cy="125" r="6" fill="#e74c3c" opacity="0.8"/>

  <!-- Right wardrobe -->
  <rect x="560" y="60" width="110" height="125" fill="#5c3a1e" stroke="#3a2010" stroke-width="2"/>
  <rect x="565" y="65" width="48" height="115" fill="#6b4226" stroke="#3a2010" stroke-width="1.5"/>
  <rect x="617" y="65" width="48" height="115" fill="#6b4226" stroke="#3a2010" stroke-width="1.5"/>
  <circle cx="609" cy="120" r="3" fill="#d4a017" stroke="#b8860b" stroke-width="1"/>
  <circle cx="621" cy="120" r="3" fill="#d4a017" stroke="#b8860b" stroke-width="1"/>
  <rect x="558" y="56" width="114" height="6" fill="#4a2a10" stroke="#3a2010" stroke-width="1"/>

  <!-- Ceiling lamp -->
  <line x1="346" y1="0" x2="346" y2="30" stroke="#888" stroke-width="2"/>
  <polygon points="326,30 366,30 376,50 316,50" fill="#f5e6c8" stroke="#888" stroke-width="1.5"/>
  <ellipse cx="346" cy="50" rx="30" ry="4" fill="#e8d8b0" stroke="#888" stroke-width="1"/>
  <!-- Light glow -->
  <ellipse cx="346" cy="130" rx="120" ry="100" fill="#fff8e0" opacity="0.12"/>

  <!-- Wall picture frame left -->
  <rect x="255" y="80" width="60" height="45" fill="#e8d8a8" stroke="#5c3a1e" stroke-width="3"/>
  <rect x="260" y="85" width="50" height="35" fill="#87ceeb" stroke="none"/>
  <!-- Simple landscape in frame -->
  <rect x="260" y="105" width="50" height="15" fill="#6b8e23"/>
  <circle cx="295" cy="92" r="7" fill="#f0e060"/>

  <!-- Wall picture frame right -->
