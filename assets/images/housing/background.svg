    <line x1="90" y1="280" x2="90" y2="300"/>
    <line x1="150" y1="280" x2="150" y2="300"/>
    <line x1="210" y1="280" x2="210" y2="300"/>
    <line x1="270" y1="280" x2="270" y2="300"/>
    <line x1="330" y1="280" x2="330" y2="300"/>
    <line x1="390" y1="280" x2="390" y2="300"/>
    <line x1="450" y1="280" x2="450" y2="300"/>
    <line x1="510" y1="280" x2="510" y2="300"/>
    <line x1="570" y1="280" x2="570" y2="300"/>
    <line x1="630" y1="280" x2="630" y2="300"/>
    <line x1="690" y1="280" x2="690" y2="300"/>
    <line x1="60" y1="300" x2="60" y2="320"/>
    <line x1="120" y1="300" x2="120" y2="320"/>
    <line x1="180" y1="300" x2="180" y2="320"/>
    <line x1="240" y1="300" x2="240" y2="320"/>
    <line x1="300" y1="300" x2="300" y2="320"/>
    <line x1="360" y1="300" x2="360" y2="320"/>
    <line x1="420" y1="300" x2="420" y2="320"/>
    <line x1="480" y1="300" x2="480" y2="320"/>
    <line x1="540" y1="300" x2="540" y2="320"/>
    <line x1="600" y1="300" x2="600" y2="320"/>
    <line x1="660" y1="300" x2="660" y2="320"/>
