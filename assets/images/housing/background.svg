  <rect x="425" y="95" width="40" height="55" fill="#f5deb3" stroke="none"/>
  <!-- Abstract art in frame -->
  <circle cx="445" cy="115" r="12" fill="#c0392b" opacity="0.6"/>
  <circle cx="440" cy="125" r="10" fill="#2980b9" opacity="0.5"/>
  <rect x="430" y="130" width="20" height="10" fill="#27ae60" opacity="0.5"/>

  <!-- Small rug on floor -->
  <ellipse cx="350" cy="340" rx="100" ry="30" fill="#8b3a3a" opacity="0.5"/>
  <ellipse cx="350" cy="340" rx="85" ry="22" fill="#a04040" opacity="0.4"/>
  <ellipse cx="350" cy="340" rx="65" ry="14" fill="#b85050" opacity="0.3"/>
