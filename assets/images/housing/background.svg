    <line x1="360" y1="260" x2="360" y2="280"/>
    <line x1="420" y1="260" x2="420" y2="280"/>
    <line x1="480" y1="260" x2="480" y2="280"/>
    <line x1="540" y1="260" x2="540" y2="280"/>
    <line x1="600" y1="260" x2="600" y2="280"/>
    <line x1="660" y1="260" x2="660" y2="280"/>
