<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150">
  <rect width="200" height="150" fill="#e8eef7"/>
  <rect x="0" y="125" width="200" height="25" fill="#b0b8c8"/>
  <!-- Bucket -->
  <polygon points="70,50 60,120 140,120 130,50" fill="#808080" stroke="#333" stroke-width="2"/>
  <!-- Bucket bands -->
  <line x1="63" y1="70" x2="137" y2="70" stroke="#666" stroke-width="2"/>
  <line x1="61" y1="95" x2="139" y2="95" stroke="#666" stroke-width="2"/>
  <!-- Bucket handle -->
  <path d="M72,50 Q100,25 128,50" fill="none" stroke="#555" stroke-width="3"/>
  <!-- Water inside -->
  <polygon points="72,55 65,110 135,110 128,55" fill="#87ceeb" opacity="0.6"/>
  <!-- Water surface -->
  <path d="M72,55 Q85,60 100,55 Q115,50 128,55" fill="#87ceeb" stroke="#5f9ea0" stroke-width="1"/>
  <!-- Water drops -->
  <ellipse cx="85" cy="38" rx="3" ry="5" fill="#87ceeb" stroke="#5f9ea0" stroke-width="1"/>
  <ellipse cx="115" cy="42" rx="2" ry="4" fill="#87ceeb" stroke="#5f9ea0" stroke-width="1"/>
</svg>