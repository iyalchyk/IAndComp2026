<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150">
  <rect width="200" height="150" fill="#e8eef7"/>
  <!-- Tile pattern on wall -->
  <rect x="0" y="0" width="200" height="90" fill="#dce8f0"/>
  <line x1="0" y1="30" x2="200" y2="30" stroke="#c8d8e0" stroke-width="1"/>
  <line x1="0" y1="60" x2="200" y2="60" stroke="#c8d8e0" stroke-width="1"/>
  <line x1="50" y1="0" x2="50" y2="90" stroke="#c8d8e0" stroke-width="1"/>
  <line x1="100" y1="0" x2="100" y2="90" stroke="#c8d8e0" stroke-width="1"/>
  <line x1="150" y1="0" x2="150" y2="90" stroke="#c8d8e0" stroke-width="1"/>
  <!-- Floor -->
  <rect x="0" y="120" width="200" height="30" fill="#b0b8c8"/>
  <!-- Bathtub -->
  <path d="M25,65 L25,115 Q25,125 35,125 L165,125 Q175,125 175,115 L175,65 Z" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  <!-- Tub inside -->
  <path d="M30,70 L30,112 Q30,120 38,120 L162,120 Q170,120 170,112 L170,70 Z" fill="#e0f0f8"/>
  <!-- Tub rim -->
  <rect x="20" y="62" width="160" height="8" rx="4" fill="#f5f5f5" stroke="#333" stroke-width="2"/>
  <!-- Faucet -->
  <rect x="145" y="40" width="8" height="25" fill="#c0c0c0" stroke="#333" stroke-width="1.5"/>
  <rect x="140" y="38" width="18" height="6" rx="3" fill="#c0c0c0" stroke="#333" stroke-width="1.5"/>
  <!-- Faucet spout -->
  <path d="M148,44 Q148,50 140,52" fill="none" stroke="#c0c0c0" stroke-width="4"/>
  <path d="M148,44 Q148,50 140,52" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- Tub feet -->
  <ellipse cx="35" cy="127" rx="6" ry="4" fill="#c0c0c0" stroke="#333" stroke-width="1"/>
  <ellipse cx="165" cy="127" rx="6" ry="4" fill="#c0c0c0" stroke="#333" stroke-width="1"/>
</svg>