<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150">
  <rect width="200" height="150" fill="#e8eef7"/>
  <!-- Tile wall -->
  <rect x="0" y="0" width="200" height="70" fill="#dce8f0"/>
  <!-- Floor -->
  <rect x="0" y="120" width="200" height="30" fill="#c8b8a0"/>
  <!-- Round jacuzzi - top view perspective -->
  <ellipse cx="100" cy="90" rx="75" ry="35" fill="#d0d8e0" stroke="#333" stroke-width="2"/>
  <!-- Water -->
  <ellipse cx="100" cy="88" rx="68" ry="30" fill="#87ceeb"/>
  <!-- Bubbles -->
  <circle cx="70" cy="82" r="4" fill="#b0e0ff" stroke="#87ceeb" stroke-width="1" opacity="0.8"/>
  <circle cx="85" cy="92" r="3" fill="#b0e0ff" stroke="#87ceeb" stroke-width="1" opacity="0.8"/>
  <circle cx="110" cy="85" r="5" fill="#b0e0ff" stroke="#87ceeb" stroke-width="1" opacity="0.8"/>
  <circle cx="130" cy="90" r="3.5" fill="#b0e0ff" stroke="#87ceeb" stroke-width="1" opacity="0.8"/>
  <circle cx="95" cy="78" r="3" fill="#b0e0ff" stroke="#87ceeb" stroke-width="1" opacity="0.8"/>
  <circle cx="120" cy="95" r="4" fill="#b0e0ff" stroke="#87ceeb" stroke-width="1" opacity="0.8"/>
  <circle cx="75" cy="95" r="2.5" fill="#b0e0ff" stroke="#87ceeb" stroke-width="1" opacity="0.8"/>
  <circle cx="105" cy="98" r="3" fill="#b0e0ff" stroke="#87ceeb" stroke-width="1" opacity="0.8"/>
  <!-- Steam lines -->
  <path d="M60,65 Q65,55 60,45" fill="none" stroke="#c8d8e8" stroke-width="2" opacity="0.5"/>
  <path d="M100,60 Q105,50 100,40" fill="none" stroke="#c8d8e8" stroke-width="2" opacity="0.5"/>
  <path d="M140,65 Q145,55 140,45" fill="none" stroke="#c8d8e8" stroke-width="2" opacity="0.5"/>
  <!-- Jacuzzi controls -->
  <rect x="155" y="70" width="14" height="10" rx="2" fill="#c0c0c0" stroke="#333" stroke-width="1"/>
  <circle cx="159" cy="75" r="2" fill="#4caf50"/>
  <circle cx="166" cy="75" r="2" fill="#f44336"/>
</svg>