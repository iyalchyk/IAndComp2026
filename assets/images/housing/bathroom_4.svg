<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150">
  <rect width="200" height="150" fill="#e8eef7"/>
  <!-- Sky -->
  <rect x="0" y="0" width="200" height="60" fill="#87ceeb"/>
  <!-- Clouds -->
  <circle cx="40" cy="20" r="12" fill="white" opacity="0.8"/>
  <circle cx="55" cy="18" r="15" fill="white" opacity="0.8"/>
  <circle cx="70" cy="22" r="10" fill="white" opacity="0.8"/>
  <circle cx="150" cy="30" r="10" fill="white" opacity="0.7"/>
  <circle cx="162" cy="28" r="12" fill="white" opacity="0.7"/>
  <!-- Ground / deck -->
  <rect x="0" y="55" width="200" height="95" fill="#c8b8a0"/>
  <!-- Pool deck tiles -->
  <rect x="0" y="55" width="200" height="10" fill="#d8c8b0" stroke="#c0b098" stroke-width="1"/>
  <!-- Pool -->
  <rect x="15" y="65" width="170" height="70" rx="8" fill="#4a90b8" stroke="#333" stroke-width="2"/>
  <!-- Pool inner -->
  <rect x="20" y="70" width="160" height="60" rx="6" fill="#5aa8d0"/>
  <!-- Water ripples -->
  <path d="M30,85 Q55,80 80,85 Q105,90 130,85 Q155,80 170,85" fill="none" stroke="#7ec8e8" stroke-width="1.5"/>
  <path d="M30,100 Q55,95 80,100 Q105,105 130,100 Q155,95 170,100" fill="none" stroke="#7ec8e8" stroke-width="1.5"/>
  <path d="M30,115 Q55,110 80,115 Q105,120 130,115 Q155,110 170,115" fill="none" stroke="#7ec8e8" stroke-width="1.5"/>
  <!-- Pool ladder -->
  <rect x="160" y="58" width="4" height="20" fill="#c0c0c0" stroke="#333" stroke-width="1.5"/>
  <rect x="172" y="58" width="4" height="20" fill="#c0c0c0" stroke="#333" stroke-width="1.5"/>
  <rect x="160" y="64" width="16" height="3" rx="1" fill="#c0c0c0" stroke="#333" stroke-width="1"/>
  <rect x="160" y="72" width="16" height="3" rx="1" fill="#c0c0c0" stroke="#333" stroke-width="1"/>
</svg>