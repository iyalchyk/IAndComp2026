<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150">
  <rect width="200" height="150" fill="#e8eef7"/>
  <rect x="0" y="125" width="200" height="25" fill="#d2b48c"/>
  <!-- Rustic wooden bench -->
  <!-- Seat plank -->
  <rect x="35" y="75" width="130" height="12" rx="2" fill="#deb887" stroke="#333" stroke-width="2"/>
  <!-- Wood grain lines -->
  <line x1="45" y1="79" x2="75" y2="79" stroke="#c4a060" stroke-width="1"/>
  <line x1="90" y1="81" x2="130" y2="81" stroke="#c4a060" stroke-width="1"/>
  <line x1="135" y1="79" x2="155" y2="79" stroke="#c4a060" stroke-width="1"/>
  <!-- Legs - angled outward for rustic look -->
  <rect x="48" y="87" width="8" height="38" fill="#c4a060" stroke="#333" stroke-width="1.5" transform="rotate(-5,52,87)"/>
  <rect x="144" y="87" width="8" height="38" fill="#c4a060" stroke="#333" stroke-width="1.5" transform="rotate(5,148,87)"/>
  <!-- Cross brace -->
  <line x1="52" y1="105" x2="148" y2="105" stroke="#c4a060" stroke-width="3"/>
  <line x1="52" y1="105" x2="148" y2="105" stroke="#333" stroke-width="1"/>
  <!-- Backrest - simple plank -->
  <rect x="40" y="45" width="120" height="10" rx="2" fill="#deb887" stroke="#333" stroke-width="2"/>
  <!-- Backrest supports -->
  <rect x="50" y="55" width="6" height="20" fill="#c4a060" stroke="#333" stroke-width="1.5"/>
  <rect x="144" y="55" width="6" height="20" fill="#c4a060" stroke="#333" stroke-width="1.5"/>
</svg>