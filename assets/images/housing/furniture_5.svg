<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150">
  <rect width="200" height="150" fill="#e8eef7"/>
  <rect x="0" y="125" width="200" height="25" fill="#d2b48c"/>
  <!-- Office desk -->
  <rect x="95" y="50" width="90" height="10" fill="#808080" stroke="#333" stroke-width="2"/>
  <rect x="100" y="60" width="8" height="60" fill="#808080" stroke="#333" stroke-width="1.5"/>
  <rect x="172" y="60" width="8" height="60" fill="#808080" stroke="#333" stroke-width="1.5"/>
  <!-- Desk drawer -->
  <rect x="110" y="60" width="60" height="25" fill="#909090" stroke="#333" stroke-width="1.5"/>
  <rect x="132" y="69" width="16" height="4" rx="2" fill="#c0c0c0" stroke="#333" stroke-width="1"/>
  <!-- Office chair -->
  <rect x="25" y="30" width="50" height="8" rx="4" fill="#404040" stroke="#333" stroke-width="2"/>
  <!-- Chair back -->
  <rect x="30" y="38" width="40" height="32" rx="4" fill="#505050" stroke="#333" stroke-width="2"/>
  <!-- Chair seat -->
  <rect x="25" y="70" width="50" height="10" rx="3" fill="#505050" stroke="#333" stroke-width="2"/>
  <!-- Chair stem -->
  <rect x="47" y="80" width="6" height="20" fill="#606060" stroke="#333" stroke-width="1.5"/>
  <!-- Chair base star -->
  <line x1="25" y1="105" x2="75" y2="105" stroke="#606060" stroke-width="3"/>
  <line x1="25" y1="105" x2="75" y2="105" stroke="#333" stroke-width="1"/>
  <!-- Wheels -->
  <circle cx="28" cy="108" r="4" fill="#404040" stroke="#333" stroke-width="1.5"/>
  <circle cx="72" cy="108" r="4" fill="#404040" stroke="#333" stroke-width="1.5"/>
  <circle cx="50" cy="108" r="4" fill="#404040" stroke="#333" stroke-width="1.5"/>
</svg>