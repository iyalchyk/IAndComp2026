<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150">
  <rect width="200" height="150" fill="#e8eef7"/>
  <rect x="0" y="125" width="200" height="25" fill="#d2b48c"/>
  <!-- Stove -->
  <rect x="20" y="45" width="60" height="80" rx="2" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <rect x="20" y="45" width="60" height="10" fill="#c0c0c0" stroke="#333" stroke-width="2"/>
  <circle cx="38" cy="50" r="5" fill="none" stroke="#555" stroke-width="2"/>
  <circle cx="62" cy="50" r="5" fill="none" stroke="#555" stroke-width="2"/>
  <!-- Oven door -->
  <rect x="26" y="68" width="48" height="35" rx="2" fill="#d0d0d0" stroke="#333" stroke-width="1.5"/>
  <rect x="36" y="71" width="28" height="4" rx="2" fill="#999" stroke="#333" stroke-width="1"/>
  <rect x="36" y="80" width="28" height="18" rx="2" fill="#444" stroke="#333" stroke-width="1"/>
  <!-- Knobs -->
  <circle cx="30" cy="60" r="2.5" fill="#999" stroke="#333" stroke-width="1"/>
  <circle cx="42" cy="60" r="2.5" fill="#999" stroke="#333" stroke-width="1"/>
  <!-- Fridge -->
  <rect x="110" y="20" width="60" height="105" rx="3" fill="#f0f0f0" stroke="#333" stroke-width="2"/>
  <!-- Fridge top (freezer) -->
  <rect x="110" y="20" width="60" height="30" fill="#e8e8e8" stroke="#333" stroke-width="2"/>
  <line x1="110" y1="50" x2="170" y2="50" stroke="#333" stroke-width="2"/>
  <!-- Fridge handles -->
  <rect x="160" y="30" width="4" height="14" rx="2" fill="#c0c0c0" stroke="#333" stroke-width="1"/>
  <rect x="160" y="65" width="4" height="20" rx="2" fill="#c0c0c0" stroke="#333" stroke-width="1"/>
</svg>