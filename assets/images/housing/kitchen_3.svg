<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150">
  <rect width="200" height="150" fill="#e8eef7"/>
  <rect x="0" y="125" width="200" height="25" fill="#d2b48c"/>
  <!-- Back wall / counter -->
  <rect x="10" y="55" width="180" height="10" fill="#c4b59a" stroke="#333" stroke-width="1.5"/>
  <!-- Cabinets above -->
  <rect x="10" y="20" width="50" height="32" rx="2" fill="#deb887" stroke="#333" stroke-width="2"/>
  <rect x="65" y="20" width="50" height="32" rx="2" fill="#deb887" stroke="#333" stroke-width="2"/>
  <rect x="140" y="20" width="50" height="32" rx="2" fill="#deb887" stroke="#333" stroke-width="2"/>
  <!-- Cabinet handles -->
  <rect x="30" y="33" width="10" height="3" rx="1" fill="#d4a017" stroke="#333" stroke-width="0.5"/>
  <rect x="85" y="33" width="10" height="3" rx="1" fill="#d4a017" stroke="#333" stroke-width="0.5"/>
  <rect x="160" y="33" width="10" height="3" rx="1" fill="#d4a017" stroke="#333" stroke-width="0.5"/>
  <!-- Stove -->
  <rect x="10" y="65" width="45" height="60" rx="2" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
  <circle cx="22" cy="70" r="4" fill="none" stroke="#555" stroke-width="1.5"/>
  <circle cx="42" cy="70" r="4" fill="none" stroke="#555" stroke-width="1.5"/>
  <rect x="15" y="82" width="35" height="28" fill="#d0d0d0" stroke="#333" stroke-width="1"/>
  <!-- Counter space -->
  <rect x="55" y="65" width="55" height="60" rx="2" fill="#deb887" stroke="#333" stroke-width="2"/>
  <!-- Sink -->
  <rect x="65" y="58" width="30" height="12" rx="3" fill="#b0b0b0" stroke="#333" stroke-width="1.5"/>
  <circle cx="80" cy="55" r="2" fill="#c0c0c0" stroke="#333" stroke-width="1"/>
  <!-- Fridge -->
  <rect x="140" y="30" width="50" height="95" rx="3" fill="#f0f0f0" stroke="#333" stroke-width="2"/>
  <line x1="140" y1="60" x2="190" y2="60" stroke="#333" stroke-width="1.5"/>
  <rect x="182" y="40" width="3" height="12" rx="1" fill="#c0c0c0" stroke="#333" stroke-width="0.5"/>
  <rect x="182" y="70" width="3" height="18" rx="1" fill="#c0c0c0" stroke="#333" stroke-width="0.5"/>
</svg>