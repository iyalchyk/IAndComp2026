<!doctype html>

<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Я и Компьютер</title>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="https://unpkg.com/98.css@0.1.4/build/98.css" />
  <script src="https://code.jquery.com/jquery-3.5.1.min.js" type="text/javascript"></script>

</head>

<body>

  <div class="window">
    <div class="title-bar">
      <div class="title-bar-text">
         Я и Компьютер
      </div>
      <div class="title-bar-controls">
        <button aria-label="Minimize"></button>
        <button aria-label="Maximize"></button>
        <button aria-label="Close"></button>
      </div>
    </div>
    <div class="menu">
      <span class="new_game">Новая игра</span>
<!--      <span class="new_game">Помощь</span>-->
    </div>
    <div class="status_bar">
      <span class="date">
        <label>Дата: </label>
        <label id="date">21/2/21</label>
      </span>
      <span class="time">
        <label>Время: </label>
        <label id="time">20:00</label>
      </span>
    </div>
    <div id="status_panel" class="switchable">
      <div class="status_box personal_status">
        <fieldset>
          <legend>Личный статус</legend>
          <div class="field-row">
            <label>Деньги:</label>
            <label id="money">23</label>
          </div>
          <div class="field-row">
            <label>Статус:</label>
            <label class="info status">Хакер</label>
          </div>
          <div class="field-row">
            <label>Работа:</label>
            <label class="info job">нач. прогр.</label>
          </div>
          <div class="field-row">
            <label>Настроение:</label>
            <label id="mood">27</label>
          </div>
          <div class="field-row">
            <label>Сытость:</label>
            <label id="satiety">31</label>
          </div>
          <div class="field-row">
            <label>Образование:</label>
            <label class="info education">Высшее</label>
          </div>
          <div class="field-row">
            <label>Англ. яз.:</label>
            <label class="info english">5 уровень</label>
          </div>
        </fieldset>
      </div>
      <div class="status_box computer_status">
        <fieldset>
          <legend>Компьютер</legend>
          <div class="field-row">
            <label>Монитор:</label>
            <label class="monitor">14"</label>
          </div>
          <div class="field-row">
            <label>Принтер:</label>
            <label class="info">Пока нет</label>
          </div>
          <div class="field-row">
            <label>Сканер:</label>
            <label class="info">Пока нет</label>
          </div>
          <div class="field-row">
            <label>Модем:</label>
            <label class="info">Пока нет</label>
          </div>
          <hr/>
          <div class="field-row">
            <label>Процессор:</label>
            <label class="info">Пока нет</label>
          </div>
          <div class="field-row">
            <label>Винчестер:</label>
            <label class="info">Пока нет</label>
          </div>
          <div class="field-row">
            <label>CD-Rom:</label>
            <label class="info">Пока нет</label>
          </div>
           <div class="field-row">
            <label>Память RAM:</label>
            <label class="info">Пока нет</label>
          </div>
          <div class="field-row">
            <label>Звук. карта:</label>
            <label class="info">Пока нет</label>
          </div>
          <div class="field-row">
            <label>Видео карта:</label>
            <label class="info">Пока нет</label>
          </div>
        </fieldset>
      </div>
      <div class="status_box housing_status">
        <fieldset>
          <legend>Житие мое</legend>
          <div class="field-row">
            <label>Кол. комнат:</label>
            <label class="info">1</label>
          </div>
          <div class="field-row">
            <label>Мебель:</label>
            <label class="info">Подержанная</label>
          </div>
          <div class="field-row">
            <label>Кухня:</label>
            <label class="info">Маленькая</label>
          </div>
          <div class="field-row">
            <label>Ванная:</label>
            <label class="info">Ведро</label>
          </div>
          <div class="field-row">
            <label>Ваша одежда:</label>
            <label class="info">Летняя</label>
          </div>
          <div class="field-row">
            <label>Машина:</label>
            <label class="info">Пятерка 2105</label>
          </div>
        </fieldset>
      </div>
      <div class="status_box software_status">
        <fieldset>
          <legend>Программы</legend>
          <div class="field-row">
            <label>Система:</label>
            <label class="info">NC</label>
          </div>
          <div class="field-row">
            <label>Прог-ование:</label>
            <label class="info">Pascal</label>
          </div>
          <div class="field-row">
            <label>Графика:</label>
            <label class="info">Пока нет</label>
          </div>
          <div class="field-row">
            <label>Антивирус:</label>
            <label class="info">Пока нет</label>
          </div>
        </fieldset>
      </div>
      <div class="status_box internet_status">
        <fieldset>
          <legend>Интернет</legend>
          <div class="field-row">
            <label>Выход:</label>
            <label class="info">Пока нет</label>
          </div>
        </fieldset>
      </div>
      <div class="status_box job_status">
        <fieldset>
          <legend>Работа</legend>
          <div class="field-row">
            <label>Зарплата:</label>
            <label class="info">30</label>
          </div>
        </fieldset>
      </div>
      <div class="status_box education_status">
        <fieldset>
          <legend>Учёба</legend>
          <div class="field-row">
              <label>Школа</label>
              <label class="info">Вы выучились в школе</label>
            </div>
          <div class="field-row">
              <label>Англ. яз.</label>
              <label class="info">Посещаю ($8 в день)</label>
            </div>
          <div class="field-row">
              <label>Комп. курсы</label>
              <label class="info">Посещаю ($8 в день)</label>
            </div>
        </fieldset>
      </div>
    </div>
    <div id="housing_panel" class="switchable">
      <div class="buttons_box">
        <div>
          <button>Купить новую квартиру и продать старую</button>
          <button>Закупка мебели</button>
          <button>Купить кухню</button>
          <button>Купить ванную</button>
        </div>
      </div>
      <div class="info_box">
        Покупайте и обустраивайте вашу квартиру
      </div>
      <div class="price_box">
        <label>Цена: </label>
        <label class="price">0</label>
      </div>
    </div>
    <div id="buttons_panel" class="buttons_box">
      <div>
        <button id="housing_button">Квартира</button>
        <button id="shop_button">Магазин</button>
        <button id="entertainment_button">Развлечения</button>
        <button>Хобби</button>
        <button>Обучение</button>
        <button>Работа</button>
        <button>Банк</button>
        <button>Компьютер</button>
        <button>Программы</button>
        <button>Выход в интернет</button>
        <button>Хакерство</button>
      </div>
    </div>
    <button id="home_button">Вернуться</button>
  </div>

  <div id="footer"></div>
  <script src="js/main.js" type="text/javascript"></script>

</body>

</html>
