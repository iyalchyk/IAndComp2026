<div id="hacking_panel" class="switchable panel">
    <div class="hacking_layout">
        <div class="hacking_header">
            <h3 data-i18n="dom.hacking.title"></h3>
        </div>
        <div class="hacking_controls">
            <button id="hacking_get_task_button" data-i18n="dom.hacking.get_task_button"></button>
            <button id="hacking_execute_button" style="display: none;" data-i18n="dom.hacking.execute_button"></button>
        </div>
        <div class="hacking_task_box">
            <label id="hacking_task_label" data-i18n="dom.hacking.no_task"></label>
        </div>
        <div id="hacking_progress_container" style="display: none;">
            <div id="hacking_progress_bar"></div>
        </div>
    </div>
</div>
