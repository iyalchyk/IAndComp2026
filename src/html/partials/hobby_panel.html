<div id="hobby_panel" class="switchable panel">
    <div class="hobby_layout">
        <div class="hobby_left_col">
            <div class="hobby_section hobby_shop">
                <fieldset>
                    <legend data-i18n="dom.hobby.shop_legend"></legend>
                    <div class="hobby_shop_layout">
                        <div class="hobby_shop_image">
                            <img id="hobby_shop_image" src="/assets/images/hobby/hobby_placeholder.png" alt="fish">
                        </div>
                        <div class="hobby_shop_buttons">
                            <button id="buy_groundbait_button" name="groundbait" data-i18n="dom.hobby.buy_groundbait"></button>
                            <button id="buy_fishing_rod_button" name="fishing_rod" data-i18n="dom.hobby.buy_fishing_rod"></button>
                            <button id="buy_fishing_tackle_button" name="fishing_tackle" data-i18n="dom.hobby.buy_fishing_tackle"></button>
                        </div>
                    </div>
                </fieldset>
            </div>
            <div class="hobby_section hobby_price">
                <fieldset>
                    <legend data-i18n="dom.hobby.price_legend"></legend>
                    <div class="field-row">
                        <label data-i18n="dom.hobby.price"></label>
                        <label id="hobby_panel_price_label">-</label>
                    </div>
                </fieldset>
            </div>
        </div>
        <div class="hobby_right_col">
            <div class="hobby_desc_box">
                <label id="hobby_desc_label" data-i18n="dom.hobby.default_description"></label>
            </div>
        </div>
    </div>
    <div class="hobby_section hobby_inventory">
        <fieldset>
            <legend data-i18n="dom.hobby.inventory_legend"></legend>
            <div class="field-row">
                <label data-i18n="dom.hobby.groundbait_prefix"></label>
                <label id="hobby_panel_groundbait_amount_label">0</label>
                <label data-i18n="dom.hobby.groundbait_suffix"></label>
            </div>
            <div class="field-row">
                <label data-i18n="dom.hobby.fishing_rod"></label>
                <label id="hobby_panel_fishing_rod_label"></label>
            </div>
            <div class="field-row">
                <label data-i18n="dom.hobby.fishing_tackle"></label>
                <label id="hobby_panel_fishing_tackle_label"></label>
            </div>
            <div class="field-row">
                <label data-i18n="dom.hobby.total_fish"></label>
                <label id="hobby_panel_fish_amount_label">0</label>
            </div>
        </fieldset>
    </div>
    <div class="hobby_go_fishing">
        <button id="go_fishing_button" name="fishing" data-i18n="dom.hobby.go_fishing"></button>
    </div>
    <div id="bus_confirm_dialog" class="confirm_dialog_overlay" style="display: none;">
        <div class="confirm_dialog">
            <div class="title-bar">
                <div class="title-bar-text" data-i18n="dom.hobby.bus_dialog.title"></div>
            </div>
            <div class="confirm_dialog_body">
                <p data-i18n="dom.hobby.bus_dialog.line_1"></p>
                <p data-i18n="dom.hobby.bus_dialog.line_2"></p>
                <p><b data-i18n="dom.hobby.bus_dialog.line_3"></b></p>
            </div>
            <div class="confirm_dialog_buttons">
                <button id="bus_confirm_yes" data-i18n="common.yes"></button>
                <button id="bus_confirm_no" data-i18n="common.no"></button>
            </div>
        </div>
    </div>
    <div id="gas_confirm_dialog" class="confirm_dialog_overlay" style="display: none;">
        <div class="confirm_dialog">
            <div class="title-bar">
                <div class="title-bar-text" data-i18n="dom.hobby.gas_dialog.title"></div>
            </div>
            <div class="confirm_dialog_body">
                <p data-i18n="dom.hobby.gas_dialog.line_1"></p>
            </div>
            <div class="confirm_dialog_buttons">
                <button id="gas_confirm_yes" data-i18n="common.yes"></button>
                <button id="gas_confirm_no" data-i18n="common.no"></button>
            </div>
        </div>
    </div>
</div>

<div id="fishing_game_panel" class="switchable panel" style="display: none;">
    <div id="fishing_game_intro">
        <div class="info_box" data-i18n="dom.hobby.lake_title"></div>
        <div class="fishing_game_text">
            <p data-i18n="dom.hobby.fishing_intro"></p>
        </div>
        <button id="fishing_game_start_button" data-i18n="dom.hobby.start_button"></button>
    </div>

    <div id="fishing_game_play" style="display: none;">
        <div id="fishing_lake">
            <div id="fishing_fish" class="fishing_fish" style="display: none;"></div>
            <div id="fishing_fish2" class="fishing_fish" style="display: none;"></div>
        </div>
    </div>

    <div id="fishing_game_results" style="display: none;">
        <div class="info_box" data-i18n="dom.hobby.results_title"></div>
        <div class="fishing_game_text">
            <p data-i18n-html="dom.hobby.result_fish"></p>
            <p data-i18n-html="dom.hobby.result_mood"></p>
            <p data-i18n-html="dom.hobby.result_satiety"></p>
        </div>
        <button id="fishing_game_home_button" data-i18n="dom.hobby.go_home"></button>
    </div>

    <div class="fishing_game_stats">
        <div class="price_box">
            <label data-i18n="dom.hobby.sidebar_caught"></label>
            <label id="fishing_game_caught_label" class="price">0</label>
        </div>
        <div class="price_box">
            <label data-i18n="dom.hobby.sidebar_groundbait"></label>
            <label id="fishing_game_groundbait_label" class="price">0</label>
        </div>
        <div class="price_box">
            <label data-i18n="dom.hobby.sidebar_time"></label>
            <label id="fishing_game_time_label" class="price">30</label>
        </div>
    </div>
</div>
