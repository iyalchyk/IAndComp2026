<div id="housing_panel" class="switchable panel">
    <div class="housing_main">
        <div class="housing_layout">
            <div class="housing_left_col">
                <div class="housing_section housing_shop">
                    <fieldset>
                        <legend>Недвижимость</legend>
                        <div class="housing_shop_layout">
                            <div class="housing_shop_image">
                                <img id="housing_preview_image" src="/assets/images/housing/store.svg" alt="">
                            </div>
                            <div class="housing_shop_buttons">
                                <button id="buy_apartment_button" name="apartment">Купить новую квартиру</button>
                                <button id="buy_furniture_button" name="furniture">Закупка мебели</button>
                                <button id="buy_kitchen_button" name="kitchen">Купить кухню</button>
                                <button id="buy_bathroom_button" name="bathroom">Купить ванную</button>
                            </div>
                        </div>
                    </fieldset>
                </div>
                <div class="housing_section housing_price">
                    <fieldset>
                        <legend>Цена</legend>
                        <div class="field-row">
                            <label>Стоимость:</label>
                            <label id="housing_panel_price_label">-</label>
                        </div>
                    </fieldset>
                </div>
            </div>
            <div class="housing_right_col">
                <div class="housing_desc_box">
                    <label id="housing_preview_desc">Покупайте и обустраивайте вашу квартиру. Улучшайте мебель, кухню и ванную для комфортной жизни.</label>
                </div>
            </div>
        </div>
        <div class="housing_section housing_inventory">
            <fieldset>
                <legend>Ваше жильё</legend>
                <div class="field-row">
                    <label>Квартира:</label>
                    <label id="housing_panel_apartment_label">-</label>
                </div>
                <div class="field-row">
                    <label>Мебель:</label>
                    <label id="housing_panel_furniture_label">-</label>
                </div>
                <div class="field-row">
                    <label>Кухня:</label>
                    <label id="housing_panel_kitchen_label">-</label>
                </div>
                <div class="field-row">
                    <label>Ванная:</label>
                    <label id="housing_panel_bathroom_label">-</label>
                </div>
            </fieldset>
        </div>
    </div>
</div>
