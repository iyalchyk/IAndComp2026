<div id="housing_panel" class="switchable panel">
    <div class="housing_layout">
        <div class="housing_buttons_col">
            <button id="buy_apartment_button" name="apartment">Купить новую квартиру и продать старую</button>
            <button id="buy_furniture_button" name="furniture">Закупка мебели</button>
            <button id="buy_kitchen_button" name="kitchen">Купить кухню</button>
            <button id="buy_bathroom_button" name="bathroom">Купить ванную</button>
        </div>
        <div class="housing_preview_col">
            <img id="housing_preview_image" src="assets/images/housing/store.svg" alt="" />
            <div id="housing_preview_desc">Покупайте и обустраивайте вашу квартиру</div>
            <div class="price_box">
                <label>Цена: </label>
                <label id="housing_panel_price_label" class="price">-</label>
            </div>
        </div>
    </div>
</div>
